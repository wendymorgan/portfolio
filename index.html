<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wendy M. Morgan, PhD — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Instrument+Serif:ital@0;1&amp;family=Oswald:wght@500;600;700&amp;family=Open+Sans:wght@400;600&amp;display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  body { font-family: 'Inter', system-ui, sans-serif; }

  :focus-visible {
    outline: 2px solid #1f3a5f;
    outline-offset: 2px;
    border-radius: 3px;
  }
  button, a { -webkit-tap-highlight-color: transparent; }

  #p-scroll::-webkit-scrollbar { width: 8px; }
  #p-scroll::-webkit-scrollbar-thumb { background: rgba(28,26,23,0.18); border-radius: 4px; }

  .skip-link {
    position: absolute; left: -9999px; top: 0;
    background: #1c1a17; color: #ffffff;
    padding: 12px 16px; z-index: 9999; text-decoration: none;
    font-size: 14px;
  }
  .skip-link:focus { left: 16px; top: 16px; }
</style>
</head>
<body style="background-color: #ffffff;">

<a class="skip-link" href="#root">Skip to main content</a>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="pubdata.js"></script>
<script type="text/babel" src="portfolio.jsx" data-presets="react"></script>

<script type="text/babel" data-presets="react">
  function Mount() {
    const [size, setSize] = React.useState({ w: window.innerWidth, h: window.innerHeight });
    React.useEffect(() => {
      const onR = () => setSize({ w: window.innerWidth, h: window.innerHeight });
      window.addEventListener('resize', onR);
      return () => window.removeEventListener('resize', onR);
    }, []);
    return <PortfolioFrame width={size.w} height={size.h} />;
  }
  function go() {
    if (!window.PortfolioFrame) { setTimeout(go, 30); return; }
    ReactDOM.createRoot(document.getElementById('root')).render(<Mount />);
  }
  go();
</script>

</body>
</html>
